<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aäron Art &amp; Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --walnut:#2b211b;--walnut-soft:#3a2d24;--bone:#efe6d8;--amber:#c98a3d;--bark:#8a7460;
  --line:rgba(239,230,216,.22);
  --rule:rgba(239,230,216,.45);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--walnut);color:var(--bone);font-family:'Outfit',sans-serif;font-weight:300;line-height:1.65}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
a:focus-visible,button:focus-visible{outline:2px solid var(--amber);outline-offset:3px}

/* sharp logo-like geometry: no rounded corners anywhere */
nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 5vw;border-bottom:1px solid var(--rule);position:sticky;top:0;background:rgba(43,33,27,.94);backdrop-filter:blur(8px);z-index:10}
.brand{display:flex;align-items:center;gap:14px}
.brand img{height:44px;width:auto}
.wordmark{font-family:'Cormorant Garamond',serif;font-size:1.2rem;letter-spacing:.16em;font-weight:600;white-space:nowrap}
nav ul{display:flex;gap:30px;list-style:none;font-size:.76rem;letter-spacing:.22em;text-transform:uppercase}
nav ul a{opacity:.7;transition:opacity .2s}
nav ul a:hover{opacity:1}
.nav-right{display:flex;align-items:center;gap:14px}
.lang-toggle{display:flex;border:1px solid var(--rule);font-size:.74rem;letter-spacing:.14em}
.lang-toggle button{padding:8px 14px;opacity:.6;transition:.2s}
.lang-toggle button.active{background:var(--bone);color:var(--walnut);opacity:1;font-weight:500}
.basket{font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--rule);padding:8px 16px;transition:.2s}
.basket:hover{background:var(--bone);color:var(--walnut)}

.hero{display:grid;grid-template-columns:1.05fr .95fr;min-height:74vh;border-bottom:1px solid var(--rule)}
.hero-text{padding:8vh 6vw;display:flex;flex-direction:column;justify-content:center;gap:24px}
.eyebrow{font-size:.74rem;letter-spacing:.34em;text-transform:uppercase;color:var(--amber)}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(2.4rem,4.5vw,4rem);line-height:1.08}
h1 em{font-style:italic;color:var(--amber)}
.hero-text p{max-width:46ch;opacity:.82;font-size:1.02rem}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.btn{display:inline-block;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;padding:14px 28px;transition:.2s;border:1px solid var(--rule)}
.btn-solid{background:var(--bone);color:var(--walnut);font-weight:500;border-color:var(--bone)}
.btn-solid:hover{background:transparent;color:var(--bone)}
.btn-ghost:hover{border-color:var(--bone)}
.hero-img{position:relative;overflow:hidden;border-left:1px solid var(--rule)}
.hero-img img{width:100%;height:100%;object-fit:cover}
.hero-img figcaption{position:absolute;bottom:0;left:0;right:0;padding:16px 24px;font-size:.76rem;letter-spacing:.16em;text-transform:uppercase;background:linear-gradient(transparent,rgba(43,33,27,.85))}
/* logo watermark behind hero text — black lines woven into the page */
.hero-text{position:relative}


.grain{display:block;width:100%;height:46px;color:var(--bark);opacity:.5}

.intro{display:grid;grid-template-columns:auto 1fr;gap:6vw;align-items:center;padding:8vh 6vw;border-bottom:1px solid var(--rule)}
.logo-block{width:min(260px,44vw)}
.intro h2,.collection h2,.story h2,.commission h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(1.7rem,2.8vw,2.5rem)}
.intro p{max-width:62ch;opacity:.82;margin-top:12px}

.collection{padding:9vh 6vw;border-bottom:1px solid var(--rule)}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.hint{font-size:.85rem;opacity:.6;margin-bottom:36px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.card{display:flex;flex-direction:column;gap:12px;text-align:left}
.card .frame{overflow:hidden;aspect-ratio:4/5;background:var(--walnut-soft);position:relative;border:1px solid var(--line)}
.card img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.card:hover img{transform:scale(1.045)}
.card:hover .frame{border-color:var(--rule)}
.card .more{position:absolute;right:12px;bottom:12px;background:var(--bone);color:var(--walnut);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;padding:7px 12px;opacity:0;transition:.25s}
.card:hover .more{opacity:1}
.card h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.3rem}
.card .meta{display:flex;justify-content:space-between;font-size:.8rem;opacity:.7}
.wood{text-transform:uppercase;letter-spacing:.22em;font-size:.66rem;color:var(--amber)}

.story{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rule)}
.story .img-side{border-right:1px solid var(--rule)}
.story .img-side img{width:100%;height:100%;object-fit:cover;min-height:400px}
.story .text-side{padding:9vh 6vw;display:flex;flex-direction:column;justify-content:center;gap:16px;align-items:flex-start}
.story p{max-width:52ch;opacity:.82}

.commission{padding:10vh 6vw;text-align:center;border-bottom:1px solid var(--rule)}

.commission p{max-width:54ch;margin:14px auto 28px;opacity:.82}

footer{padding:6vh 6vw 5vh;display:flex;flex-wrap:wrap;gap:28px;justify-content:space-between;align-items:flex-end;font-size:.82rem;opacity:.78}
footer .brand img{height:38px}
footer ul{list-style:none;display:flex;gap:24px;letter-spacing:.16em;text-transform:uppercase;font-size:.7rem}

.overlay{position:fixed;inset:0;background:rgba(20,14,10,.78);backdrop-filter:blur(4px);z-index:50;display:none;align-items:center;justify-content:center;padding:4vw}
.overlay.open{display:flex}
.modal{background:#241b15;border:1px solid var(--rule);max-width:980px;width:100%;max-height:92vh;overflow:auto;display:grid;grid-template-columns:1.1fr .9fr}
.gallery{padding:22px;border-right:1px solid var(--line)}
.gallery .main{overflow:hidden;aspect-ratio:4/5;background:var(--walnut-soft);border:1px solid var(--line)}
.gallery .main img{width:100%;height:100%;object-fit:cover}
.thumbs{display:flex;gap:10px;margin-top:12px}
.thumbs button{width:64px;height:64px;overflow:hidden;border:2px solid transparent;padding:0;flex:none}
.thumbs button.sel{border-color:var(--bone)}
.thumbs img{width:100%;height:100%;object-fit:cover}
.detail{padding:34px 30px 30px;display:flex;flex-direction:column;gap:14px}
.detail h3{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.9rem;line-height:1.15}
.detail .price{font-size:1.3rem;color:var(--amber)}
.detail p{opacity:.82;font-size:.95rem}
.specs{border-top:1px solid var(--line);margin-top:6px;padding-top:14px;display:grid;grid-template-columns:auto 1fr;gap:7px 22px;font-size:.88rem}
.specs dt{opacity:.55;text-transform:uppercase;letter-spacing:.14em;font-size:.68rem;padding-top:3px}
.detail .btn-solid{text-align:center;margin-top:10px}
.close{position:sticky;top:0;margin-left:auto;font-size:1.6rem;line-height:1;padding:14px 18px;opacity:.7;z-index:2;float:right}
.close:hover{opacity:1}
.buy-slot{margin-top:10px;min-height:52px}
.buy-note{font-size:.78rem;opacity:.55}
.one-of{font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--amber)}

@media (max-width:860px){
  nav ul{display:none}
  .hero{grid-template-columns:1fr;min-height:unset}
  .hero-img{order:-1;max-height:50vh;border-left:none;border-bottom:1px solid var(--rule)}
  .grid{grid-template-columns:1fr 1fr}
  .intro{grid-template-columns:1fr}
  .story{grid-template-columns:1fr}
  .story .img-side{border-right:none;border-bottom:1px solid var(--rule)}
  .modal{grid-template-columns:1fr}
  .gallery{border-right:none}
}
@media (max-width:560px){.grid{grid-template-columns:1fr}.basket{display:none}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

      <span class="wood">${p[lang].wood}</span>
      <h3>${p[lang].title}</h3>
      ${p.dim||p.price?`<div class=\"meta\"><span>${p.dim?p.dim.split('×')[0].trim():''}</span><span>${p.price}</span></div>`:''}
    </button>`).join('');
}

/* ---- Shopify Buy Button SDK ---- */
let shopifyUI = null;
let buyComponent = null;
function loadShopifySDK(){
  return new Promise((resolve)=>{
    if (window.ShopifyBuy && window.ShopifyBuy.UI) return resolve();
    const s = document.createElement('script');
    s.async = true;
    s.src = 'https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js';
    s.onload = resolve;
    document.head.appendChild(s);
  });
}
async function renderBuyButton(p){
  const slot = document.getElementById('m-buy');
  const note = document.getElementById('m-buy-note');
  slot.innerHTML = ''; note.textContent = '';
  if (!p.shopUrl){
    note.textContent = lang==='nl' ? 'Binnenkort online te bestellen — stuur een bericht voor interesse.'
                                   : 'Online ordering coming soon — send a message if interested.';
    return;
  }
  const a = document.createElement('a');
  a.className = 'btn btn-solid';
  a.style.cssText = 'display:block;text-align:center';
  a.href = p.shopUrl;
  a.target = '_blank';
  a.rel = 'noopener';
  a.textContent = lang==='nl' ? 'Bestellen' : 'Order now';
  slot.appendChild(a);
  note.textContent = lang==='nl' ? 'Je rekent veilig af via onze Shopify-winkel (iDEAL, PayPal, creditcard).'
                                 : 'Secure checkout via our Shopify store (iDEAL, PayPal, credit card).';
}

let current = 0;
function openModal(i){
  current = i;
  const p = PRODUCTS[i];
  document.getElementById('m-title').textContent = p[lang].title;
  document.getElementById('m-price').textContent = p.price; document.getElementById('m-price').style.display = p.price?'':'none';
  document.getElementById('m-desc').textContent = p[lang].desc;
  document.getElementById('m-wood').textContent = p[lang].wood;
  document.getElementById('m-dim').textContent = p.dim || '—';
  document.getElementById('m-finish').textContent = p[lang].finish;
  document.getElementById('m-main').src = p.imgs[0];
  document.getElementById('m-thumbs').innerHTML = p.imgs.map((im,j)=>
    `<button class="${j===0?'sel':''}" onclick="setMain(${j},this)"><img src="${im}" alt=""></button>`).join('');
  renderBuyButton(p);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function setMain(j, btn){
  document.getElementById('m-main').src = PRODUCTS[current].imgs[j];
  document.querySelectorAll('#m-thumbs button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
function clearCart(){
  try{
    const keys = [];
    for (let i=0;i<localStorage.length;i++){ const k = localStorage.key(i); if(/shopify/i.test(k)) keys.push(k); }
    keys.forEach(k=>localStorage.removeItem(k));
  }catch(e){}
  alert(lang==='nl' ? 'Mandje geleegd. De pagina wordt opnieuw geladen.' : 'Basket cleared. The page will reload.');
  location.reload();
}
setLang('nl');
</script>
